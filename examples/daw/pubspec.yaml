publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  blender_ui:
    path: ../..
  blender_ui_daw:
    path: ../../packages/blender_ui_daw
  flutter:
    sdk: flutter
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: false
