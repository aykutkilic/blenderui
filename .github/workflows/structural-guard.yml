name: Structural guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dart-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run tool/structural_guard.dart
